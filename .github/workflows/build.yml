name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build RustBridge
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: |
          cargo build --release -p dc_api -p dc_api_macros
          cargo build --release -p dc_netwatch

      - name: Run tests
        run: cargo test --release -p dc_netwatch

      - name: Rename to RustBridge.dll
        shell: bash
        run: |
          mkdir -p staging
          cp target/release/dc_netwatch.dll staging/RustBridge.dll

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: RustBridge
          path: staging/RustBridge.dll
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: RustBridge
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: RustBridge ${{ github.ref_name }}
          generate_release_notes: true
          files: release/RustBridge.dll
